# Booklet server + its Postgres. Copy .env.example to .env and edit, then:
#   docker compose up -d --build
#
# One app on one port (site + account portal + sync API + /admin). The host port
# is bound to 127.0.0.1 so Docker exposes nothing publicly — Plesk's nginx
# reverse-proxies your subdomain to it (see booklet-sync-server/DEPLOY.md).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: booklet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: booklet_sync
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: booklet-sync-server/Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://booklet:${POSTGRES_PASSWORD}@db:5432/booklet_sync
      # Inside the container we must bind 0.0.0.0 so Docker's port mapping can
      # reach the process; the host-side mapping below is what restricts exposure.
      BOOKLET_BIND: 0.0.0.0:8080
      BOOKLET_PUBLIC_URL: ${BOOKLET_PUBLIC_URL}
      BOOKLET_BLOB_DIR: /data/blobs
      # Optional features — uncomment/set in .env to enable:
      # BOOKLET_ALLOW_REGISTRATION: ${BOOKLET_ALLOW_REGISTRATION}
      # BOOKLET_SMTP_HOST: ${BOOKLET_SMTP_HOST}
      # BOOKLET_SMTP_PORT: ${BOOKLET_SMTP_PORT}
      # BOOKLET_SMTP_USER: ${BOOKLET_SMTP_USER}
      # BOOKLET_SMTP_PASSWORD: ${BOOKLET_SMTP_PASSWORD}
      # BOOKLET_SMTP_TLS: ${BOOKLET_SMTP_TLS}
      # BOOKLET_MAIL_FROM: ${BOOKLET_MAIL_FROM}
      # STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    volumes:
      - blob-data:/data
    ports:
      - "127.0.0.1:8080:8080"   # the whole app — Plesk nginx proxies your domain here
    restart: unless-stopped

volumes:
  db-data:
  blob-data:
